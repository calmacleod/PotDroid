version: 2
updates:
  - package-ecosystem: bundler
    directory: "/rails"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: gradle
    directory: "/android"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
