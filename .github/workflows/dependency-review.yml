name: Dependency Review

on:
  pull_request:
    paths:
      - "rails/Gemfile.lock"
      - "android/**/*.gradle*"
      - "android/gradle/wrapper/gradle-wrapper.properties"
      - ".github/workflows/dependency-review.yml"

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
